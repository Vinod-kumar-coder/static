<!DOCTYPE html>
<html>
    <head>
         <link rel="stylesheet" href="style.css">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="bgform">
          <div class="p-3 text-center">
            <h1 class="head1">Form</h1>
            <div class="d-flex flex-row justify-content-center">
                <p class="pe-3 pt-2">Name</p>
                <input id="inputElement"type="text" placeholder="Enter your name" class="bord mb-3"/>
            </div>
            <div class="d-flex flex-row justify-content-center">
                <p class="pe-3 pt-2">Email</p>
                <input type="email" placeholder="Enter your email" class="bord mb-3"/><br/>
            </div>
            <div class="d-flex flex-row justify-content-center">
                <p class="pe-3 pt-2">Password</p>
                <input type="password" placeholder="Enter your password" class="bord mb-3"/>
            </div>
               <input type="radio" name="gender" value="male" class="pr-2"/><label>Male</label>
               <input type="radio" name="gender" value="Female"/><label>Female</label><br/>
               <div>
                  <button class="mt-2" onclick="submitText()">Submit</button>
               </div>
               <p id="submitText"></p>
          </div>
          <div class="text-center">
            <h1 class="head1">Guessing Number</h1>
            <h3 class="head">Guess the number between 1 and 100</h3>
            <br/>
            <input type="text" id="guessing" class="bord" placeholder="Guess the number"/>
            <div>
                <button class=" mt-3 btn btn-primary" onclick="checkNumber()">Check</button>
            </div>
            <p id="verification"></p>
          </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript.js"></script>
    </body>
</html>
